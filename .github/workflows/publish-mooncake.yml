name: Publish to mooncake

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: moon update

      - name: Check
        run: moon check --target wasm-gc

      - name: Test
        run: moon test

      - name: Publish
        env:
          MOONCAKE_TOKEN: ${{ secrets.MOONCAKE_TOKEN }}
        run: moon publish
